name: CI - Seguridad Moodle HCVB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  issues: write
  security-events: write

jobs:

  owasp-zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear .env para CI
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=moodle" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MOODLE_ADMIN_USER=admin" >> .env
          echo "MOODLE_ADMIN_PASSWORD=Admin1234!" >> .env
          echo "MOODLE_ADMIN_EMAIL=admin@hcvb.cl" >> .env
          echo "MOODLE_SITE_NAME=Plataforma HCVB" >> .env

      - name: Start Moodle stack
        run: docker compose up -d

      - name: Wait for Moodle
        run: sleep 90

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          artifact_name: zap-report

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=juacodelotero_moodle-hcvb
            -Dsonar.organization=juacodelotero
            -Dsonar.exclusions=**/*.sql,**/vendor/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
